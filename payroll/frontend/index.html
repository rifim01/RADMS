<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#CC0000">
  <title>RIFIM Payroll — Login</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── Full-screen airport background ── */
    .login-bg {
      position: fixed;
      inset: 0;
      background-color: #080810;
      background-image:
        linear-gradient(160deg, rgba(0,0,0,0.85) 0%, rgba(100,0,0,0.55) 50%, rgba(0,0,0,0.9) 100%),
        url('/frontend-dashboard/public/hero-bg.png');
      background-size: cover;
      background-position: center;
    }
    .login-bg::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      height: 35%;
      background: radial-gradient(ellipse at bottom, rgba(204,0,0,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Layout ── */
    .login-page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 16px 60px;
    }

    /* ── Top status badge ── */
    .login-status {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 100px;
      padding: 6px 18px;
      color: rgba(255,255,255,0.6);
      font-size: 10px;
      letter-spacing: 2px;
      white-space: nowrap;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Glassmorphism card ── */
    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(8, 8, 18, 0.8);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 22px;
      padding: 46px 42px 38px;
      box-shadow:
        0 40px 80px rgba(0,0,0,0.65),
        0 0 0 1px rgba(204,0,0,0.1) inset,
        0 1px 0 rgba(255,255,255,0.08) inset;
    }

    /* ── RIFIM App Icon ── */
    .rifim-icon {
      width: 74px;
      height: 74px;
      border-radius: 20px;
      background: linear-gradient(145deg, #D00000, #7A0000);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 22px;
      box-shadow: 0 8px 36px rgba(204,0,0,0.55), 0 2px 8px rgba(0,0,0,0.4);
      position: relative;
      overflow: hidden;
    }
    .rifim-icon::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 45%; height: 45%;
      background: linear-gradient(135deg, rgba(255,255,255,0.18), transparent);
      border-radius: 0 20px 0 60%;
    }

    /* ── Airplane SVG icon ── */
    .icon-plane {
      width: 42px;
      height: 42px;
      fill: white;
      opacity: 0.95;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    /* ── App title ── */
    .login-title {
      text-align: center;
      margin-bottom: 26px;
    }
    .login-title h1 {
      font-size: 30px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 6px;
      line-height: 1;
      margin-bottom: 6px;
    }
    .login-title h1 .accent { color: #CC0000; }
    .login-title .company {
      font-size: 9.5px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 1.8px;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 5px;
    }
    .login-title .module {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(204,0,0,0.15);
      border: 1px solid rgba(204,0,0,0.25);
      border-radius: 100px;
      padding: 3px 12px;
      font-size: 10px;
      color: rgba(255,80,80,0.9);
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(204,0,0,0.35), transparent);
      margin: 20px 0 24px;
    }

    /* ── Form ── */
    .form-group { margin-bottom: 18px; }

    .form-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.38);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .label-icon { font-size: 12px; }

    .form-control {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 11px;
      color: #ffffff;
      font-size: 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .form-control::placeholder { color: rgba(255,255,255,0.18); }
    .form-control:focus {
      border-color: rgba(204,0,0,0.55);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 0 3px rgba(204,0,0,0.12);
    }

    /* ── Error ── */
    #loginError {
      color: #ff7070;
      font-size: 12.5px;
      margin-bottom: 14px;
      display: none;
      padding: 10px 14px;
      background: rgba(204,0,0,0.12);
      border-radius: 9px;
      border-left: 3px solid #CC0000;
    }

    /* ── Login button ── */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #CC0000 0%, #8B0000 100%);
      color: #fff;
      border: none;
      border-radius: 11px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.8px;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 24px rgba(204,0,0,0.45);
      position: relative;
      overflow: hidden;
    }
    .btn-login::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      transition: left .5s;
    }
    .btn-login:hover::before { left: 100%; }
    .btn-login:hover {
      background: linear-gradient(135deg, #DD1111 0%, #990000 100%);
      box-shadow: 0 6px 28px rgba(204,0,0,0.55);
      transform: translateY(-1px);
    }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    /* ── Footer link ── */
    .login-link {
      text-align: center;
      margin-top: 18px;
    }
    .login-link a {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      transition: color .2s;
    }
    .login-link a:hover { color: rgba(255,255,255,0.65); }

    /* ── Bottom tagline ── */
    .tagline {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.18);
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── Toast ── */
    #toastContainer {
      position: fixed;
      top: 20px; right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 240px;
      animation: slideIn .3s ease;
      color: #fff;
    }
    .toast.success { background: #14532d; border: 1px solid #22c55e; }
    .toast.error   { background: #450a0a; border: 1px solid #CC0000; }
    .toast.warning { background: #422006; border: 1px solid #f59e0b; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── Loading ── */
    .loading-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 9000;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #CC0000;
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .login-card {
        padding: 36px 24px 30px;
        border-radius: 18px;
      }
      .login-title h1 { font-size: 26px; letter-spacing: 4px; }
      .rifim-icon { width: 62px; height: 62px; border-radius: 16px; }
      .login-status { display: none; }
      .tagline { font-size: 8px; letter-spacing: 2px; }
    }
  </style>
</head>
<body>

<!-- Airport background -->
<div class="login-bg"></div>

<div class="login-page">

  <!-- Status indicator -->
  <div class="login-status">
    <span class="status-dot"></span>
    SISTEM AKTIF
  </div>

  <!-- Login card -->
  <div class="login-card">

    <!-- RIFIM Icon -->
    <div class="rifim-icon">
      <svg class="icon-plane" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 4 L18 20 H6 L10 25 H18 L15.5 41 L24 36.5 L32.5 41 L30 25 H38 L42 20 H30 Z"/>
        <rect x="10" y="22" width="28" height="2.5" rx="1.25"/>
      </svg>
    </div>

    <!-- App name & title -->
    <div class="login-title">
      <h1>RIFIM <span class="accent">ERP</span></h1>
      <div class="company">PT. RIFIM INTERNATIONAL GEMILANG</div>
      <div class="module">✈ Payroll &amp; HR Management</div>
    </div>

    <div class="divider"></div>

    <!-- Login form -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">
          <span class="label-icon">📧</span> EMAIL STAFF
        </label>
        <input type="email" id="loginEmail" class="form-control"
          placeholder="email@rifimgemilang.com"
          required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">
          <span class="label-icon">🔑</span> PASSWORD AKSES
        </label>
        <input type="password" id="loginPassword" class="form-control"
          placeholder="••••••••••"
          required autocomplete="current-password">
      </div>

      <div id="loginError"></div>

      <button type="submit" id="loginBtn" class="btn-login">
        🔐 Masuk ke Sistem
      </button>
    </form>

    <div class="login-link">
      <a href="#">Lupa password? Hubungi Admin Cabang</a>
    </div>

  </div>

  <!-- Bottom tagline -->
  <div class="tagline">
    INTEGRITAS &nbsp;·&nbsp; INOVASI &nbsp;·&nbsp; KUALITAS &nbsp;·&nbsp; KEBERLANJUTAN
  </div>

</div>

<div id="toastContainer"></div>
<div id="loadingOverlay" class="loading-overlay" style="display:none">
  <div class="spinner"></div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = 'dashboard.html';

  function toast(msg, type) {
    const icons = { success: '✅', error: '❌', warning: '⚠️' };
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<span>${icons[type] || ''}</span><span>${msg}</span>`;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn   = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');
    const email = document.getElementById('loginEmail').value.trim();
    const pw    = document.getElementById('loginPassword').value;

    btn.disabled = true;
    btn.textContent = 'Memverifikasi...';
    errEl.style.display = 'none';

    try {
      await Auth.login(email, pw);
      toast('Login berhasil! Mengalihkan...', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 800);
    } catch (e) {
      errEl.textContent = '⚠️  ' + e.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '🔐 Masuk ke Sistem';
    }
  }

  const API = {
    login: async (email, pw) => {
      const url = APP_CONFIG.GAS_URL;
      if (!url || url.includes('GANTI')) throw new Error('GAS URL belum dikonfigurasi di config.js');
      const res = await fetch(url, {
        method: 'POST',
        body: JSON.stringify({ action: 'login', email, password: pw }),
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
      });
      if (!res.ok) throw new Error('Server error: ' + res.status);
      return res.json();
    }
  };
</script>
</body>
</html>
